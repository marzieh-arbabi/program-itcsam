name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILDOZER_WARN_ON_ROOT: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev python3-pip

      - name: Upgrade pip tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # 🔥 مهم: نسخه پایدارتر Buildozer
      - name: Install Buildozer and dependencies
        run: |
          pip install "buildozer==1.5.0" cython==0.29.37 pexpect virtualenv

      # 🔥 جلوگیری از cache خراب (علت اصلی خطای تو)
      - name: Clean previous build cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      # 🔥 جلوگیری از خطای python-for-android missing
      - name: Pre-download python-for-android
        run: |
          mkdir -p .buildozer/android/platform
          git clone https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android

      # 🔥 build واقعی
      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
