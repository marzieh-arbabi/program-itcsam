name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk
          pip install --upgrade pip
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython
          pip install python-for-android

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools

      - name: Install Android Command Line Tools
        run: |
          cd $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          mv cmdline-tools latest

      - name: Accept Android licenses
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install Android packages
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

      - name: Set environment variables
        run: |
          echo "ANDROIDSDK=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
      
      - name: Install build requirements
        run: |
          sudo apt install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev
          
      - name: Build APK
        env:
          ANDROIDAPI: 34
          ANDROIDMINAPI: 21
        run: |
          buildozer android debug

